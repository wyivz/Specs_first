name: test

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package
        run: pip install -e ".[dev]"
      - name: Run unit tests
        # Prefer discover with a hard timeout so a hung Playwright/network path
        # cannot stall CI indefinitely. Live smoke stays local-only.
        run: |
          python -m unittest discover -s tests -v
        timeout-minutes: 10
